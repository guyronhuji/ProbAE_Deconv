seed: 42
device: "auto"

dataset:
  name: "levine32"
  input_path: "data/levine32_processed.h5ad"
  marker_columns: null
  label_column: "label"
  cell_id_column: "cell_id"
  val_fraction: 0.15
  test_fraction: 0.15

preprocessing:
  transform: "arcsinh"
  arcsinh_cofactor: 5.0
  normalization: "zscore"
  clip_min: -6.0
  clip_max: 6.0

model:
  type: "probabilistic_archetypal_autoencoder"
  n_archetypes: 8
  encoder_hidden_dims: [128, 64]
  activation: "relu"
  dropout: 0.1

loss:
  type: "gaussian_nll"
  entropy_reg_weight: 1.0e-3
  diversity_reg_weight: 1.0e-3
  variance_reg_weight: 1.0e-5

training:
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 1.0e-4
  max_epochs: 100
  patience: 15
  grad_clip: 1.0
  mixed_precision: false

output:
  base_dir: "outputs"
  run_name: null

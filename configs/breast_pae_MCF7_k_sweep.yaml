seed: 42
output_dir: outputs/breast_pae_MCF_k_sweep
show_progress: true
show_run_logs: true
show_training_progress: true
training_progress_level: epoch
training_progress_leave: false
cpu_multiprocessing_workers: 1
cpu_parallel_methods: []
gpu_multiprocessing_workers: 1
gpu_parallel_methods: [probabilistic_archetypal_ae]

dataset:
  name: custom_cytof
  input_path: data/MCF7.h5ad   # VIM-high removed, 300k cells
  marker_columns: null
  label_column: null
  cell_id_column: cell_id
  val_fraction: 0.15
  test_fraction: 0.15

preprocessing:
  transform: none
  arcsinh_cofactor: 5.0
  normalization: zscore
  clip_min: null
  clip_max: null

seeds: [42, 123, 456]

method_order:
  - probabilistic_archetypal_ae

sweeps:
  k_values:    [5]#[4, 5, 6, 7]
  latent_dims: [5]#[4, 5, 6, 7]

methods:
  probabilistic_archetypal_ae:
    device: auto
    hidden_dims: [128, 64]
    dropout: 0.1
    batch_size: 8192
    lr: 1.0e-3
    weight_decay: 1.0e-4
    max_epochs: 5000
    patience: 15
    grad_clip: 1.0
    entropy_reg_weight: 1.0e-3
    diversity_reg_weight: 5.0e-3
    variance_reg_weight: 1.0e-4

marker_groups: {}

secondary_dataset:
  enabled: false

auxiliary_models:
  enabled: false
